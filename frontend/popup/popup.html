<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkFlow</title>
  <link rel="stylesheet" href="popup.css">
  <link rel="stylesheet" href="../components/login-form.css">
</head>
<body>
  <div class="app-shell">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <button class="side-item" data-view="links" title="Links">
        <span class="side-icon">🔗</span>
        <span class="side-label">Links</span>
      </button>
      <button class="side-item" data-view="todo" title="Todo">
        <span class="side-icon">✅</span>
        <span class="side-label">Todo</span>
      </button>
      <button class="side-item" data-view="playground" title="Playground">
        <span class="side-icon">🔬</span>
        <span class="side-label">Playground</span>
      </button>
      <button class="side-item" id="openDashboardBtn" title="Dashboard">
        <span class="side-icon">📊</span>
        <span class="side-label">Dashboard</span>
      </button>
      <div class="side-spacer"></div>
      <button class="side-item" id="settingsBtn" title="Settings" aria-haspopup="true" aria-expanded="false">
        <span class="side-icon">⚙️</span>
        <span class="side-label">Settings</span>
      </button>
    </aside>
    <div class="settings-menu" id="settingsMenu" hidden>
      <button class="dropdown-item" id="profileBtn">👤 Profile</button>
      <button class="dropdown-item danger" id="logoutBtn">🚪 Log out</button>
    </div>

    <!-- Main area -->
    <div class="main-area">
      <!-- Search (links view only) -->
      <div class="search-container" id="searchContainer">
        <input
          type="text"
          class="search-input"
          id="searchInput"
          placeholder="🔍 Search..."
        />
      </div>

      <!-- Links view -->
      <div class="content view-links" id="content">
        <div class="tree-container" id="itemsContainer"></div>
        <div class="empty-state" id="emptyState" style="display: none;">
          <div class="empty-icon">📂</div>
          <p class="empty-text">No links yet</p>
          <p class="empty-subtext">Save your first link to get started</p>
        </div>
      </div>

      <!-- Todo view -->
      <div class="view-todo" id="todoView" hidden>
        <div class="todo-projects" id="todoProjects"></div>
        <div class="todo-kanban" id="todoKanban">
          <div class="todo-empty">Select a project</div>
        </div>
      </div>

      <!-- Playground view (iframe) -->
      <div class="view-playground" id="playgroundView" hidden>
        <iframe class="playground-frame-inline" id="playgroundFrameInline" title="Playground"></iframe>
      </div>
    </div>
  </div>

  <!-- Modals -->

  <!-- Paste URL Modal -->
  <div class="modal" id="pasteUrlModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">Add Custom Link</h3>
        <button class="modal-close" data-modal="pasteUrlModal">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="customUrl">URL</label>
          <input 
            type="url" 
            id="customUrl" 
            class="input" 
            placeholder="https://example.com"
            required
          />
        </div>
        <div class="form-group">
          <label for="customTitle">Name (optional)</label>
          <input 
            type="text" 
            id="customTitle" 
            class="input" 
            placeholder="My Link"
          />
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-modal="pasteUrlModal">Cancel</button>
        <button class="btn btn-primary" id="saveCustomLinkBtn">Save Link</button>
      </div>
    </div>
  </div>

  <!-- New Folder Modal -->
  <div class="modal" id="newFolderModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">Create Folder</h3>
        <button class="modal-close" data-modal="newFolderModal">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="folderName">Folder Name</label>
          <input 
            type="text" 
            id="folderName" 
            class="input" 
            placeholder="e.g., Frontend Resources"
            required
          />
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-modal="newFolderModal">Cancel</button>
        <button class="btn btn-primary" id="createFolderBtn">Create</button>
      </div>
    </div>
  </div>

  <!-- Rename Modal -->
  <div class="modal" id="renameModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">Rename</h3>
        <button class="modal-close" data-modal="renameModal">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="renameInput">New Name</label>
          <input 
            type="text" 
            id="renameInput" 
            class="input" 
            required
          />
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-modal="renameModal">Cancel</button>
        <button class="btn btn-primary" id="saveRenameBtn">Save</button>
      </div>
    </div>
  </div>

  <!-- Confirm Delete Modal -->
  <div class="modal" id="confirmDeleteModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">Confirm Delete</h3>
        <button class="modal-close" data-modal="confirmDeleteModal">×</button>
      </div>
      <div class="modal-body">
        <p id="deleteMessage">Are you sure you want to delete this?</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-modal="confirmDeleteModal">Cancel</button>
        <button class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
      </div>
    </div>
  </div>

  <!-- Profile Modal -->
  <div class="modal" id="profileModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">Profile</h3>
        <button class="modal-close" data-modal="profileModal">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Email</label>
          <div id="profileEmail" class="profile-field">—</div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-modal="profileModal">Close</button>
      </div>
    </div>
  </div>

  <!-- Move Link Modal -->
  <div class="modal" id="moveLinkModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">Move Link</h3>
        <button class="modal-close" data-modal="moveLinkModal">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="moveToTab">Tab</label>
          <select id="moveToTab" class="select">
            <!-- Dynamically populated -->
          </select>
        </div>
        <div class="form-group">
          <label for="moveToFolder">Folder (optional)</label>
          <select id="moveToFolder" class="select">
            <option value="">No Folder (Root)</option>
            <!-- Dynamically populated -->
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-modal="moveLinkModal">Cancel</button>
        <button class="btn btn-primary" id="confirmMoveBtn">Move</button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="../lib/api.js"></script>
  <script src="../lib/auth.js"></script>
  <script src="../lib/storage.js"></script>
  <script src="../lib/platform-detector.js"></script>
  <script src="../components/modal.js"></script>
  <script src="../components/breadcrumbs.js"></script>
  <script src="../components/link-card.js"></script>
  <script src="../components/folder-card.js"></script>
  <script src="../components/login-form.js"></script>
  <script src="popup.js"></script>
</body>
</html>
