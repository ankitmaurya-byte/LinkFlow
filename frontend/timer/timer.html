<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Timer</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #ffffff; color: #181d26; display: flex; align-items: center; justify-content: center; }
    .tm-app { text-align: center; padding: 24px; }
    .tm-display {
      font-size: 96px;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
      letter-spacing: 2px;
      margin-bottom: 16px;
      color: #181d26;
    }
    .tm-display.run { color: #0a2e0e; }
    .tm-display.done { color: #aa2d00; }
    .tm-mode {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 20px;
    }
    .tm-mode button {
      padding: 8px 16px;
      border: 1px solid #dddddd;
      background: #ffffff;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
    }
    .tm-mode button.active { background: #181d26; color: #ffffff; border-color: #181d26; }
    .tm-mode button:hover:not(.active) { background: #f8fafc; }
    .tm-controls { display: flex; gap: 10px; justify-content: center; margin-bottom: 16px; }
    .tm-controls button {
      padding: 12px 28px;
      border: 0;
      cursor: pointer;
      font-size: 16px;
      font-family: inherit;
    }
    .tm-start { background: #181d26; color: #ffffff; }
    .tm-start:hover { background: #0d1218; }
    .tm-pause { background: #d9a441; color: #181d26; }
    .tm-reset { background: #f8fafc; color: #181d26; border: 1px solid #dddddd !important; }
    .tm-custom {
      display: flex;
      gap: 6px;
      justify-content: center;
      align-items: center;
      font-size: 13px;
      color: #6b7280;
    }
    .tm-custom input {
      width: 50px;
      padding: 4px 6px;
      border: 1px solid #dddddd;
      text-align: center;
      font-family: inherit;
      font-size: 13px;
    }
    .tm-cycles { font-size: 13px; color: #6b7280; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="tm-app">
    <div class="tm-mode">
      <button data-mode="pomodoro" data-min="25" class="active">Pomodoro 25m</button>
      <button data-mode="short" data-min="5">Short break 5m</button>
      <button data-mode="long" data-min="15">Long break 15m</button>
      <button data-mode="custom">Custom</button>
    </div>
    <div class="tm-display" id="tmDisplay">25:00</div>
    <div class="tm-controls">
      <button class="tm-start" id="tmStart">Start</button>
      <button class="tm-pause" id="tmPause" hidden>Pause</button>
      <button class="tm-reset" id="tmReset">Reset</button>
    </div>
    <div class="tm-custom" id="tmCustom" hidden>
      <span>Set:</span>
      <input type="number" id="tmMin" min="0" max="999" value="25" />
      <span>:</span>
      <input type="number" id="tmSec" min="0" max="59" value="0" />
      <button id="tmApply" style="padding:4px 10px;border:1px solid #dddddd;background:#ffffff;cursor:pointer;">Apply</button>
    </div>
    <div class="tm-cycles" id="tmCycles">Pomodoros today: 0</div>
  </div>
  <script>
    (function () {
      const KEY = 'linkflow.timer.v1';
      const display = document.getElementById('tmDisplay');
      const startBtn = document.getElementById('tmStart');
      const pauseBtn = document.getElementById('tmPause');
      const resetBtn = document.getElementById('tmReset');
      const customWrap = document.getElementById('tmCustom');
      const minInput = document.getElementById('tmMin');
      const secInput = document.getElementById('tmSec');
      const applyBtn = document.getElementById('tmApply');
      const cyclesEl = document.getElementById('tmCycles');

      let totalSec = 25 * 60;
      let remaining = totalSec;
      let intervalId = null;
      let mode = 'pomodoro';
      const today = new Date().toDateString();
      let state = load();
      if (state.day !== today) state = { day: today, pomodoros: 0 };
      cyclesEl.textContent = `Pomodoros today: ${state.pomodoros}`;

      function load() {
        try { return JSON.parse(localStorage.getItem(KEY)) || { day: today, pomodoros: 0 }; }
        catch { return { day: today, pomodoros: 0 }; }
      }
      function save() { localStorage.setItem(KEY, JSON.stringify(state)); }

      function fmt(s) {
        const m = Math.floor(s / 60);
        const r = s % 60;
        return `${String(m).padStart(2, '0')}:${String(r).padStart(2, '0')}`;
      }
      function render() {
        display.textContent = fmt(remaining);
        document.title = fmt(remaining) + ' • Timer';
      }
      function setMode(m, minutes) {
        mode = m;
        document.querySelectorAll('.tm-mode button').forEach(b => b.classList.toggle('active', b.dataset.mode === m));
        customWrap.hidden = m !== 'custom';
        if (typeof minutes === 'number') {
          totalSec = minutes * 60;
          remaining = totalSec;
          stop(false);
          render();
        }
      }
      function start() {
        if (intervalId) return;
        startBtn.hidden = true;
        pauseBtn.hidden = false;
        display.classList.add('run');
        display.classList.remove('done');
        intervalId = setInterval(() => {
          remaining = Math.max(0, remaining - 1);
          render();
          if (remaining === 0) {
            stop(true);
            display.classList.add('done');
            try {
              const ctx = new (window.AudioContext || window.webkitAudioContext)();
              const o = ctx.createOscillator();
              const g = ctx.createGain();
              o.connect(g); g.connect(ctx.destination);
              o.frequency.value = 880; g.gain.value = 0.2;
              o.start(); o.stop(ctx.currentTime + 0.3);
            } catch (_) {}
            if (mode === 'pomodoro') {
              state.pomodoros += 1;
              save();
              cyclesEl.textContent = `Pomodoros today: ${state.pomodoros}`;
            }
          }
        }, 1000);
      }
      function stop(reset) {
        if (intervalId) clearInterval(intervalId);
        intervalId = null;
        startBtn.hidden = false;
        pauseBtn.hidden = true;
        display.classList.remove('run');
        if (reset) remaining = totalSec;
        render();
      }
      startBtn.addEventListener('click', start);
      pauseBtn.addEventListener('click', () => stop(false));
      resetBtn.addEventListener('click', () => stop(true));

      document.querySelectorAll('.tm-mode button').forEach(btn => {
        btn.addEventListener('click', () => {
          const m = btn.dataset.mode;
          if (m === 'custom') {
            setMode('custom');
          } else {
            const minutes = parseInt(btn.dataset.min, 10);
            setMode(m, minutes);
          }
        });
      });
      applyBtn.addEventListener('click', () => {
        const min = Math.max(0, parseInt(minInput.value, 10) || 0);
        const sec = Math.max(0, Math.min(59, parseInt(secInput.value, 10) || 0));
        totalSec = min * 60 + sec;
        remaining = totalSec;
        stop(false);
        render();
      });

      render();
    })();
  </script>
</body>
</html>
