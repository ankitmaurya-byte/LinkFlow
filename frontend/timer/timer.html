<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Timer</title>
  <link rel="stylesheet" href="timer.css" />
  <link rel="stylesheet" href="../lib/design.css" />
</head>
<body>
  <div class="tm-app">
    <div class="tm-mode">
      <button data-mode="pomodoro" data-min="25" class="active">Pomodoro 25m</button>
      <button data-mode="short" data-min="5">Short break 5m</button>
      <button data-mode="long" data-min="15">Long break 15m</button>
      <button data-mode="custom">Custom</button>
    </div>
    <div class="tm-display" id="tmDisplay">25:00</div>
    <div class="tm-controls">
      <button class="tm-start" id="tmStart">Start</button>
      <button class="tm-pause" id="tmPause" hidden>Pause</button>
      <button class="tm-reset" id="tmReset">Reset</button>
    </div>
    <div class="tm-custom" id="tmCustom" hidden>
      <span>Set:</span>
      <input type="number" id="tmMin" min="0" max="999" value="25" />
      <span>:</span>
      <input type="number" id="tmSec" min="0" max="59" value="0" />
      <button id="tmApply">Apply</button>
    </div>
    <div class="tm-cycles" id="tmCycles">Pomodoros today: 0</div>
  </div>
  <script src="timer.js"></script>
</body>
</html>
