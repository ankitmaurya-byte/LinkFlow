<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkFlow Chats</title>
  <link rel="stylesheet" href="playground.css">
  <link rel="stylesheet" href="../components/login-form.css">
</head>

<body>
  <div class="playground-container">
    <div class="ch-app">
      <aside class="ch-side">
        <div class="ch-search">
          <input type="search" id="chSearch" placeholder="Search users or chats…" />
        </div>

        <section class="ch-section" id="chSearchResults" hidden>
          <h4>Users</h4>
          <div id="chSearchList"></div>
        </section>

        <section class="ch-section" id="chRequests" hidden>
          <h4>Friend requests</h4>
          <div id="chRequestList"></div>
        </section>

        <section class="ch-section">
          <div class="ch-section-head">
            <h4>Chats</h4>
            <button class="ch-new-group" id="chNewGroupBtn" title="New group">+</button>
          </div>
          <div id="chChatList"></div>
        </section>

        <section class="ch-section" id="chJoinSection">
          <h4>Join group</h4>
          <div class="ch-join-row">
            <input type="text" id="chJoinCode" placeholder="Invite code" />
            <button id="chJoinBtn">Join</button>
          </div>
        </section>
      </aside>

      <main class="ch-main">
        <div class="ch-header" id="chHeader">
          <span>Select or start a chat</span>
        </div>
        <div class="ch-messages" id="chMessages"></div>
        <div class="ch-composer-wrap" id="chComposerWrap" hidden>
          <div class="ch-reply-preview" id="chReplyPreview" hidden>
            <span class="ch-reply-label">Replying to <strong id="chReplyName"></strong></span>
            <span class="ch-reply-text" id="chReplyText"></span>
            <button class="ch-reply-clear" id="chReplyClear" title="Cancel reply">×</button>
          </div>
          <div class="ch-popover" id="chPopover" hidden></div>
          <div class="ch-composer" id="chComposer">
            <button class="ch-share-btn" id="chShareBtn" title="Share / commands">🔗</button>
            <input type="text" id="chInput" placeholder="Type / for commands, @ to mention…" autocomplete="off" />
            <button class="ch-send-btn" id="chSendBtn">Send</button>
          </div>
          <div class="ch-format-hint">
            <code>**bold**</code> <code>*italic*</code> <code>~~strike~~</code> <code>__underline__</code> <code>`code`</code>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- New group modal -->
  <div class="modal" id="newGroupModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">New group</h3>
        <button class="modal-close" data-modal="newGroupModal">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="newGroupName">Group name</label>
          <input type="text" id="newGroupName" class="input" placeholder="e.g. Reading club" />
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-modal="newGroupModal">Cancel</button>
        <button class="btn btn-primary" id="newGroupCreateBtn">Create</button>
      </div>
    </div>
  </div>

  <!-- Share-to-chat modal -->
  <div class="modal" id="shareToChatModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">Share to chat</h3>
        <button class="modal-close" data-modal="shareToChatModal">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Kind</label>
          <select id="stcKind" class="select">
            <option value="url">Custom URL</option>
            <option value="bookmark">Saved bookmark</option>
            <option value="folder">Folder (with links)</option>
          </select>
        </div>
        <div class="form-group" id="stcUrlGrp">
          <label>URL</label>
          <input type="url" id="stcUrl" class="input" placeholder="https://example.com" />
        </div>
        <div class="form-group hidden" id="stcBmGrp">
          <label>Bookmark</label>
          <select id="stcBm" class="select"></select>
        </div>
        <div class="form-group hidden" id="stcFolderGrp">
          <label>Folder</label>
          <select id="stcFolder" class="select"></select>
        </div>
        <div class="form-group">
          <label>Note</label>
          <textarea id="stcNote" class="textarea" rows="2"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-modal="shareToChatModal">Cancel</button>
        <button class="btn btn-primary" id="stcSendBtn">Send</button>
      </div>
    </div>
  </div>

  <script src="../lib/icons.js"></script>
  <script src="../lib/dialog.js"></script>
  <script src="../lib/api.js"></script>
  <script src="../lib/auth.js"></script>
  <script src="../lib/storage.js"></script>
  <script src="../lib/platform-detector.js"></script>
  <script src="../components/modal.js"></script>
  <script src="playground.js"></script>
</body>

</html>
