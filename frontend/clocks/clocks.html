<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Clocks</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #ffffff; color: #181d26; }
    .ck-app { padding: 16px; }
    .ck-bar { display: flex; gap: 8px; margin-bottom: 16px; }
    .ck-bar input, .ck-bar select {
      padding: 6px 10px; border: 1px solid #dddddd; font-size: 13px; font-family: inherit;
      flex: 1;
    }
    .ck-bar button {
      padding: 6px 14px; border: 0; background: #181d26; color: #ffffff; cursor: pointer; font-size: 13px;
    }
    .ck-bar button:hover { background: #0d1218; }
    .ck-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }
    .ck-card {
      border: 1px solid #dddddd;
      padding: 14px;
      position: relative;
      background: #f8fafc;
    }
    .ck-label { font-size: 13px; color: #41454d; margin-bottom: 4px; }
    .ck-time { font-size: 28px; font-weight: 500; font-variant-numeric: tabular-nums; }
    .ck-date { font-size: 12px; color: #6b7280; margin-top: 2px; }
    .ck-tz { font-size: 11px; color: #9297a0; margin-top: 6px; }
    .ck-del {
      position: absolute; top: 6px; right: 6px;
      background: transparent; border: 0; cursor: pointer; color: #6b7280; font-size: 14px;
    }
    .ck-del:hover { color: #aa2d00; }
    .ck-empty { color: #6b7280; font-size: 13px; padding: 16px 0; }
  </style>
</head>
<body>
  <div class="ck-app">
    <div class="ck-bar">
      <input type="text" id="ckLabel" placeholder="Label (e.g. Mom in NYC)" />
      <select id="ckTz"></select>
      <button id="ckAdd">+ Add</button>
    </div>
    <div class="ck-grid" id="ckGrid"></div>
  </div>
  <script>
    (function () {
      const KEY = 'linkflow.clocks.v1';
      const grid = document.getElementById('ckGrid');
      const labelEl = document.getElementById('ckLabel');
      const tzEl = document.getElementById('ckTz');
      const addBtn = document.getElementById('ckAdd');

      const zones = (typeof Intl.supportedValuesOf === 'function')
        ? Intl.supportedValuesOf('timeZone')
        : [
            'UTC',
            'America/New_York', 'America/Los_Angeles', 'America/Chicago',
            'Europe/London', 'Europe/Paris', 'Europe/Berlin',
            'Asia/Tokyo', 'Asia/Shanghai', 'Asia/Kolkata', 'Asia/Dubai',
            'Australia/Sydney', 'Pacific/Auckland'
          ];
      for (const z of zones) {
        const opt = document.createElement('option');
        opt.value = z; opt.textContent = z;
        if (z === 'UTC') opt.selected = true;
        tzEl.appendChild(opt);
      }
      try {
        const local = Intl.DateTimeFormat().resolvedOptions().timeZone;
        tzEl.value = local;
      } catch (_) {}

      function load() {
        try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch { return []; }
      }
      function save(list) {
        localStorage.setItem(KEY, JSON.stringify(list));
      }
      let clocks = load();
      if (clocks.length === 0) {
        try {
          clocks = [{ id: '1', label: 'Local', tz: Intl.DateTimeFormat().resolvedOptions().timeZone }];
          save(clocks);
        } catch (_) {}
      }

      function fmtTime(tz) {
        try {
          return new Intl.DateTimeFormat([], {
            timeZone: tz, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
          }).format(new Date());
        } catch { return '—'; }
      }
      function fmtDate(tz) {
        try {
          return new Intl.DateTimeFormat([], {
            timeZone: tz, weekday: 'short', month: 'short', day: 'numeric'
          }).format(new Date());
        } catch { return ''; }
      }

      function render() {
        grid.innerHTML = '';
        if (clocks.length === 0) {
          grid.innerHTML = '<div class="ck-empty">No clocks. Add one above.</div>';
          return;
        }
        for (const c of clocks) {
          const card = document.createElement('div');
          card.className = 'ck-card';
          card.dataset.id = c.id;
          card.innerHTML = `
            <button class="ck-del" title="Remove">×</button>
            <div class="ck-label">${esc(c.label || c.tz)}</div>
            <div class="ck-time">${fmtTime(c.tz)}</div>
            <div class="ck-date">${fmtDate(c.tz)}</div>
            <div class="ck-tz">${esc(c.tz)}</div>
          `;
          card.querySelector('.ck-del').addEventListener('click', () => {
            clocks = clocks.filter(x => x.id !== c.id);
            save(clocks);
            render();
          });
          grid.appendChild(card);
        }
      }
      function esc(s) { const d = document.createElement('div'); d.textContent = s == null ? '' : s; return d.innerHTML; }

      function tick() {
        for (const c of clocks) {
          const card = grid.querySelector(`.ck-card[data-id="${c.id}"]`);
          if (!card) continue;
          card.querySelector('.ck-time').textContent = fmtTime(c.tz);
          card.querySelector('.ck-date').textContent = fmtDate(c.tz);
        }
      }
      addBtn.addEventListener('click', () => {
        const label = labelEl.value.trim();
        const tz = tzEl.value;
        if (!tz) return;
        clocks.push({ id: Date.now().toString(36), label: label || tz, tz });
        save(clocks);
        labelEl.value = '';
        render();
      });
      labelEl.addEventListener('keydown', e => { if (e.key === 'Enter') addBtn.click(); });

      render();
      setInterval(tick, 1000);
    })();
  </script>
</body>
</html>
